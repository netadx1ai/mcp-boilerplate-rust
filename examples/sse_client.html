<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP SSE Client Example</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
        }

        .status-bar {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ccc;
        }

        .status-indicator.connected {
            background: #10b981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.5);
        }

        .status-indicator.disconnected {
            background: #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .tool-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tool-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .tool-button:active {
            transform: translateY(0);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .event-log {
            background: #1e293b;
            border-radius: 6px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: #e2e8f0;
        }

        .event-item {
            padding: 8px;
            margin-bottom: 8px;
            border-radius: 4px;
            background: #334155;
            border-left: 3px solid #667eea;
        }

        .event-item.connection {
            border-left-color: #10b981;
        }

        .event-item.error {
            border-left-color: #ef4444;
        }

        .event-item.result {
            border-left-color: #06b6d4;
        }

        .event-time {
            color: #94a3b8;
            font-size: 11px;
        }

        .event-type {
            color: #f59e0b;
            font-weight: bold;
            margin-right: 8px;
        }

        .event-data {
            color: #e2e8f0;
            margin-top: 5px;
        }

        .clear-button {
            background: #ef4444;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            margin-top: 10px;
        }

        .clear-button:hover {
            background: #dc2626;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 15px;
        }

        .stat-item {
            text-align: center;
            padding: 15px;
            background: #f9fafb;
            border-radius: 6px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #6b7280;
            margin-top: 5px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }

        .code {
            background: #1e293b;
            color: #e2e8f0;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MCP SSE Client</h1>
            <p class="subtitle">Real-time Server-Sent Events demo for MCP Boilerplate Rust</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-indicator" id="statusIndicator"></div>
                <span id="statusText">Disconnected</span>
            </div>
            <div class="status-item">
                <span>Client ID: <span class="code" id="clientId">-</span></span>
            </div>
            <div class="status-item">
                <span>Server: <span class="code">http://localhost:8025</span></span>
            </div>
        </div>

        <div class="grid">
            <div class="panel">
                <h2>Tools</h2>
                <div class="tool-list">
                    <div class="input-group">
                        <label for="echoInput">Echo Tool</label>
                        <input type="text" id="echoInput" placeholder="Enter message to echo" value="Hello from SSE!">
                    </div>
                    <button class="tool-button" onclick="callEcho()">Call Echo</button>

                    <button class="tool-button" onclick="callPing()">Call Ping</button>
                    <button class="tool-button" onclick="callInfo()">Call Info</button>
                    <button class="tool-button" onclick="callProcessWithProgress()">Process with Progress</button>
                </div>

                <div class="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="eventsReceived">0</div>
                        <div class="stat-label">Events Received</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="toolsCalled">0</div>
                        <div class="stat-label">Tools Called</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="uptime">0s</div>
                        <div class="stat-label">Uptime</div>
                    </div>
                </div>
            </div>

            <div class="panel">
                <h2>Event Log</h2>
                <div class="event-log" id="eventLog">
                    <div class="event-item">
                        <div class="event-time">Waiting for connection...</div>
                        <div class="event-data">Click any tool button to start receiving events</div>
                    </div>
                </div>
                <button class="clear-button" onclick="clearLog()">Clear Log</button>
            </div>
        </div>
    </div>

    <script>
        const SSE_URL = 'http://localhost:8025/sse';
        const TOOLS_URL = 'http://localhost:8025/tools/call';

        let eventSource = null;
        let eventsReceived = 0;
        let toolsCalled = 0;
        let connectedAt = null;
        let uptimeInterval = null;

        // Initialize SSE connection
        function initSSE() {
            if (eventSource) {
                return; // Already connected
            }

            log('Connecting to SSE server...', 'connection');

            eventSource = new EventSource(SSE_URL);

            eventSource.onopen = () => {
                updateStatus(true);
                connectedAt = new Date();
                startUptimeTimer();
                log('Connected to SSE server', 'connection');
            };

            eventSource.onmessage = (event) => {
                eventsReceived++;
                updateStats();

                try {
                    const data = JSON.parse(event.data);
                    handleEvent(data, event);
                } catch (e) {
                    log('Failed to parse event: ' + e.message, 'error');
                }
            };

            eventSource.onerror = (error) => {
                log('SSE error occurred', 'error');
                updateStatus(false);
                
                // Auto-reconnect after 3 seconds
                setTimeout(() => {
                    if (eventSource.readyState === EventSource.CLOSED) {
                        log('Attempting to reconnect...', 'connection');
                        eventSource = null;
                        initSSE();
                    }
                }, 3000);
            };
        }

        // Handle different event types
        function handleEvent(data, event) {
            const type = data.type || 'unknown';

            switch (type) {
                case 'connection':
                    document.getElementById('clientId').textContent = data.client_id || '-';
                    log(`Connected as client: ${data.client_id}`, 'connection');
                    break;

                case 'tool_call_started':
                    log(`Tool call started: ${data.tool} (ID: ${data.request_id})`, 'info');
                    break;

                case 'tool_call_result':
                    log(`Tool result: ${data.tool}`, 'result', data.result);
                    break;

                case 'tool_call_error':
                    log(`Tool error: ${data.tool} - ${data.error}`, 'error');
                    break;

                default:
                    log(`Event: ${type}`, 'info', data);
            }
        }

        // Call a tool
        async function callTool(name, args = {}) {
            if (!eventSource || eventSource.readyState !== EventSource.OPEN) {
                initSSE();
                await new Promise(resolve => setTimeout(resolve, 1000));
            }

            toolsCalled++;
            updateStats();

            try {
                const response = await fetch(TOOLS_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        name: name,
                        arguments: args
                    })
                });

                const result = await response.json();
                log(`Tool call accepted: ${name} (Request ID: ${result.request_id})`, 'info');
            } catch (error) {
                log(`Failed to call tool: ${error.message}`, 'error');
            }
        }

        // Tool functions
        function callEcho() {
            const message = document.getElementById('echoInput').value;
            callTool('echo', { message: message });
        }

        function callPing() {
            callTool('ping', {});
        }

        function callInfo() {
            callTool('info', {});
        }

        function callProcessWithProgress() {
            callTool('process_with_progress', {
                items: ['item1', 'item2', 'item3', 'item4', 'item5']
            });
        }

        // Logging
        function log(message, type = 'info', data = null) {
            const logDiv = document.getElementById('eventLog');
            const eventItem = document.createElement('div');
            eventItem.className = `event-item ${type}`;

            const time = new Date().toLocaleTimeString();
            const timeSpan = document.createElement('div');
            timeSpan.className = 'event-time';
            timeSpan.textContent = time;

            const typeSpan = document.createElement('span');
            typeSpan.className = 'event-type';
            typeSpan.textContent = type.toUpperCase();

            const messageSpan = document.createElement('span');
            messageSpan.textContent = message;

            const messageDiv = document.createElement('div');
            messageDiv.appendChild(typeSpan);
            messageDiv.appendChild(messageSpan);

            eventItem.appendChild(timeSpan);
            eventItem.appendChild(messageDiv);

            if (data) {
                const dataDiv = document.createElement('div');
                dataDiv.className = 'event-data';
                dataDiv.textContent = JSON.stringify(data, null, 2);
                eventItem.appendChild(dataDiv);
            }

            logDiv.insertBefore(eventItem, logDiv.firstChild);

            // Keep only last 50 events
            while (logDiv.children.length > 50) {
                logDiv.removeChild(logDiv.lastChild);
            }
        }

        function clearLog() {
            const logDiv = document.getElementById('eventLog');
            logDiv.innerHTML = '<div class="event-item"><div class="event-time">Log cleared</div></div>';
        }

        // Status updates
        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const text = document.getElementById('statusText');

            if (connected) {
                indicator.classList.add('connected');
                indicator.classList.remove('disconnected');
                text.textContent = 'Connected';
            } else {
                indicator.classList.remove('connected');
                indicator.classList.add('disconnected');
                text.textContent = 'Disconnected';
                stopUptimeTimer();
            }
        }

        function updateStats() {
            document.getElementById('eventsReceived').textContent = eventsReceived;
            document.getElementById('toolsCalled').textContent = toolsCalled;
        }

        function startUptimeTimer() {
            stopUptimeTimer();
            uptimeInterval = setInterval(() => {
                if (connectedAt) {
                    const uptime = Math.floor((new Date() - connectedAt) / 1000);
                    document.getElementById('uptime').textContent = uptime + 's';
                }
            }, 1000);
        }

        function stopUptimeTimer() {
            if (uptimeInterval) {
                clearInterval(uptimeInterval);
                uptimeInterval = null;
            }
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            log('Page loaded. Ready to connect.', 'info');
            log('Click any tool button to connect to SSE server', 'info');
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
            }
            stopUptimeTimer();
        });
    </script>
</body>
</html>
