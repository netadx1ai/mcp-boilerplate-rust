<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP SSE Test Client - Enhanced</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .card h2 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .status-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #dc3545;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background: #28a745;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .btn-info {
            background: #17a2b8;
            color: white;
        }

        .btn-info:hover {
            background: #138496;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            color: #555;
        }

        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: monospace;
        }

        .input-group input:focus,
        .input-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .log-container {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            max-height: 600px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }

        .log-entry {
            padding: 8px;
            margin-bottom: 5px;
            border-radius: 4px;
            border-left: 4px solid transparent;
        }

        .log-entry.info {
            background: rgba(23, 162, 184, 0.1);
            border-left-color: #17a2b8;
            color: #17a2b8;
        }

        .log-entry.success {
            background: rgba(40, 167, 69, 0.1);
            border-left-color: #28a745;
            color: #28a745;
        }

        .log-entry.error {
            background: rgba(220, 53, 69, 0.1);
            border-left-color: #dc3545;
            color: #dc3545;
        }

        .log-entry.event {
            background: rgba(102, 126, 234, 0.1);
            border-left-color: #667eea;
            color: #667eea;
        }

        .log-time {
            opacity: 0.7;
            font-size: 11px;
            margin-right: 10px;
        }

        .log-data {
            margin-top: 5px;
            padding: 8px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9rem;
            color: #6c757d;
            margin-top: 5px;
        }

        .json-viewer {
            background: #2d2d2d;
            padding: 15px;
            border-radius: 8px;
            color: #f8f8f2;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .json-key {
            color: #66d9ef;
        }

        .json-string {
            color: #a6e22e;
        }

        .json-number {
            color: #ae81ff;
        }

        .json-boolean {
            color: #fd971f;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MCP SSE Test Client</h1>
            <p>Real-time testing for Server-Sent Events transport</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-dot" id="connectionStatus"></div>
                <span id="connectionText">Disconnected</span>
            </div>
            <div class="status-item">
                <strong>Events:</strong> <span id="eventCount">0</span>
            </div>
            <div class="status-item">
                <strong>Errors:</strong> <span id="errorCount">0</span>
            </div>
            <div class="status-item">
                <strong>Uptime:</strong> <span id="uptime">0s</span>
            </div>
        </div>

        <div class="main-grid">
            <div class="card">
                <h2>Connection Control</h2>
                
                <div class="input-group">
                    <label>SSE Server URL</label>
                    <input type="text" id="sseUrl" value="http://127.0.0.1:8025/sse" />
                </div>

                <div class="input-group">
                    <label>RPC Endpoint URL</label>
                    <input type="text" id="rpcUrl" value="http://127.0.0.1:8025/rpc" />
                </div>

                <div class="button-group">
                    <button class="btn-success" onclick="connect()">Connect</button>
                    <button class="btn-danger" onclick="disconnect()">Disconnect</button>
                    <button class="btn-secondary" onclick="clearLog()">Clear Log</button>
                </div>

                <h2 style="margin-top: 30px;">Quick Actions</h2>
                
                <div class="button-group">
                    <button class="btn-primary" onclick="testInitialize()">Initialize</button>
                    <button class="btn-primary" onclick="testListTools()">List Tools</button>
                    <button class="btn-primary" onclick="testPing()">Ping</button>
                    <button class="btn-primary" onclick="testEcho()">Echo Test</button>
                    <button class="btn-info" onclick="testCalculate()">Calculate</button>
                    <button class="btn-info" onclick="testProgress()">Progress Demo</button>
                </div>

                <h2 style="margin-top: 30px;">Custom Request</h2>
                
                <div class="input-group">
                    <label>JSON-RPC Request</label>
                    <textarea id="customRequest" rows="8">
{
  "jsonrpc": "2.0",
  "id": 1,
  "method": "tools/call",
  "params": {
    "name": "ping",
    "arguments": {}
  }
}</textarea>
                </div>

                <button class="btn-primary" onclick="sendCustomRequest()" style="width: 100%;">Send Custom Request</button>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="requestCount">0</div>
                        <div class="stat-label">Requests Sent</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="responseCount">0</div>
                        <div class="stat-label">Responses</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="avgResponseTime">0ms</div>
                        <div class="stat-label">Avg Response</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2>Event Log</h2>
                <div class="log-container" id="logContainer"></div>
            </div>
        </div>
    </div>

    <script>
        let eventSource = null;
        let eventCount = 0;
        let errorCount = 0;
        let requestCount = 0;
        let responseCount = 0;
        let connectedAt = null;
        let uptimeInterval = null;
        let responseTimes = [];

        function connect() {
            const url = document.getElementById('sseUrl').value;
            
            if (eventSource) {
                log('Already connected', 'info');
                return;
            }

            log('Connecting to ' + url, 'info');
            
            try {
                eventSource = new EventSource(url);
                
                eventSource.onopen = () => {
                    log('SSE connection established', 'success');
                    updateConnectionStatus(true);
                    connectedAt = Date.now();
                    startUptimeTimer();
                };

                eventSource.onmessage = (event) => {
                    eventCount++;
                    document.getElementById('eventCount').textContent = eventCount;
                    
                    try {
                        const data = JSON.parse(event.data);
                        log('SSE Event received', 'event', data);
                        responseCount++;
                        document.getElementById('responseCount').textContent = responseCount;
                    } catch (e) {
                        log('Received non-JSON event: ' + event.data, 'event');
                    }
                };

                eventSource.onerror = (error) => {
                    errorCount++;
                    document.getElementById('errorCount').textContent = errorCount;
                    log('SSE connection error', 'error', error);
                    
                    if (eventSource.readyState === EventSource.CLOSED) {
                        updateConnectionStatus(false);
                        stopUptimeTimer();
                        eventSource = null;
                    }
                };

            } catch (error) {
                log('Failed to create EventSource: ' + error.message, 'error');
                updateConnectionStatus(false);
            }
        }

        function disconnect() {
            if (!eventSource) {
                log('Not connected', 'info');
                return;
            }

            log('Disconnecting...', 'info');
            eventSource.close();
            eventSource = null;
            updateConnectionStatus(false);
            stopUptimeTimer();
            log('Disconnected', 'success');
        }

        async function sendRpcRequest(request) {
            const url = document.getElementById('rpcUrl').value;
            const startTime = Date.now();
            
            requestCount++;
            document.getElementById('requestCount').textContent = requestCount;

            log('Sending RPC request', 'info', request);

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(request)
                });

                const endTime = Date.now();
                const responseTime = endTime - startTime;
                responseTimes.push(responseTime);
                
                const avgTime = responseTimes.reduce((a, b) => a + b, 0) / responseTimes.length;
                document.getElementById('avgResponseTime').textContent = Math.round(avgTime) + 'ms';

                const data = await response.json();
                log('RPC response received (' + responseTime + 'ms)', 'success', data);
                
                return data;
            } catch (error) {
                log('RPC request failed: ' + error.message, 'error');
                throw error;
            }
        }

        function testInitialize() {
            sendRpcRequest({
                jsonrpc: "2.0",
                id: Date.now(),
                method: "initialize",
                params: {
                    protocolVersion: "2024-11-05",
                    capabilities: {},
                    clientInfo: {
                        name: "sse-test-client",
                        version: "1.0.0"
                    }
                }
            });
        }

        function testListTools() {
            sendRpcRequest({
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/list",
                params: {}
            });
        }

        function testPing() {
            sendRpcRequest({
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/call",
                params: {
                    name: "ping",
                    arguments: {}
                }
            });
        }

        function testEcho() {
            sendRpcRequest({
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/call",
                params: {
                    name: "echo",
                    arguments: {
                        message: "Hello from SSE test client! Time: " + new Date().toISOString()
                    }
                }
            });
        }

        function testCalculate() {
            sendRpcRequest({
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/call",
                params: {
                    name: "calculate",
                    arguments: {
                        operation: "add",
                        a: 42,
                        b: 58
                    }
                }
            });
        }

        function testProgress() {
            sendRpcRequest({
                jsonrpc: "2.0",
                id: Date.now(),
                method: "tools/call",
                params: {
                    name: "process_with_progress",
                    arguments: {
                        items: ["item1", "item2", "item3", "item4", "item5"]
                    }
                }
            });
        }

        function sendCustomRequest() {
            try {
                const requestText = document.getElementById('customRequest').value;
                const request = JSON.parse(requestText);
                sendRpcRequest(request);
            } catch (error) {
                log('Invalid JSON in custom request: ' + error.message, 'error');
            }
        }

        function log(message, type = 'info', data = null) {
            const logContainer = document.getElementById('logContainer');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            
            const time = new Date().toLocaleTimeString();
            let html = '<span class="log-time">[' + time + ']</span> ' + message;
            
            if (data) {
                html += '<div class="log-data">' + JSON.stringify(data, null, 2) + '</div>';
            }
            
            entry.innerHTML = html;
            logContainer.appendChild(entry);
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        function clearLog() {
            document.getElementById('logContainer').innerHTML = '';
            log('Log cleared', 'info');
        }

        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('connectionStatus');
            const statusText = document.getElementById('connectionText');
            
            if (connected) {
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
            } else {
                statusDot.classList.remove('connected');
                statusText.textContent = 'Disconnected';
            }
        }

        function startUptimeTimer() {
            uptimeInterval = setInterval(() => {
                if (connectedAt) {
                    const uptime = Math.floor((Date.now() - connectedAt) / 1000);
                    document.getElementById('uptime').textContent = uptime + 's';
                }
            }, 1000);
        }

        function stopUptimeTimer() {
            if (uptimeInterval) {
                clearInterval(uptimeInterval);
                uptimeInterval = null;
            }
            document.getElementById('uptime').textContent = '0s';
            connectedAt = null;
        }

        // Initialize on page load
        window.addEventListener('load', () => {
            log('SSE Test Client loaded', 'info');
            log('Click "Connect" to start SSE connection', 'info');
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>
</html>
